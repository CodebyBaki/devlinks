services:
  db:
    image: postgres:15
    container_name: devlinks-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devlinks-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: devlinksacr.azurecr.io/devlinks-backend:latest
    container_name: devlinks-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      BASE_URL: ${BASE_URL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - devlinks-network
    expose:
      - "8000"

  frontend:
    image: devlinksacr.azurecr.io/devlinks-frontend:latest
    container_name: devlinks-frontend
    depends_on:
      - backend
    networks:
      - devlinks-network
    ports:
      - "80:80"

volumes:
  postgres_data:

networks:
  devlinks-network:
    driver: bridge